<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCChart Interpreter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="top-bar">
      <h1>SCChart Interpreter</h1>
      <div id="connection-status" class="status checking">Checking connection...</div>
      <button id="upload-btn" style="display: none">Open File</button>
      <input type="file" id="file-input" accept=".json,.sctx" style="display: none" />
    </div>

    <div class="main-area">
      <div id="model-panel" class="panel">
        <label for="sctx-text-input">SCCharts Model (text)</label>
        <textarea
          id="sctx-text-input"
          class="sctx-input"
          placeholder="Paste SCCharts model code here..."
        ></textarea>
        <div class="btn-row">
          <button id="compile-model-btn" disabled>Compile &amp; Load</button>
        </div>
        <div id="text-compile-status" class="status" style="display: none"></div>
      </div>

      <div class="right-panel">
        <div id="tick-section">
          <label for="tick-input">Input (JSON or array)</label>
          <textarea
            class="small"
            id="tick-input"
            placeholder='{"A": true}'
          ></textarea>
          <div class="btn-row">
            <button id="advance-tick-btn" disabled>Advance Tick</button>
            <button id="auto-run-btn" disabled>Auto Run</button>
            <label for="auto-interval" style="font-size: 0.8rem; color: #aaa">Interval:</label>
            <input
              type="number"
              id="auto-interval"
              value="300"
              min="50"
              max="10000"
              step="50"
              style="
                width: 70px;
                padding: 0.4rem;
                background: #0a0a1a;
                color: #e0e0e0;
                border: 1px solid #334;
                border-radius: 4px;
                font-family: inherit;
                font-size: 0.8rem;
              "
            />
            <span style="font-size: 0.8rem; color: #aaa">ms</span>
            <button id="reset-btn">Reset Model</button>
            <button id="clear-output-btn">Clear Output</button>
          </div>
        </div>

        <div id="output-section">
          <label>Output</label>
          <pre
            id="tick-output"
          >No output yet.</pre>
        </div>
      </div>
    </div>

    <details id="logs-section">
      <summary style="font-family: ui-monospace, monospace; font-size: 0.85rem; color: #80cbc4; cursor: pointer;">Logs</summary>
      <pre
        id="console-logs"
      ></pre>
    </details>

    <script type="module" src="./app.js"></script>
  </body>
</html>
